<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gestión de Órdenes | Commerce Connect</title>

    <link rel="icon" href="img/NextGen Web Labs.jpg" type="image/x-icon">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- CSS del proyecto -->
    <link rel="stylesheet" href="CSS/main.css">
</head>

<body>

    <!-- HEADER -->
    <div id="header-placeholder"></div>

    <!-- CONTENIDO -->
    <main class="container py-4">

        <div class="row g-4">

            <!-- SIDEBAR ADMIN -->
            <aside class="col-12 col-lg-3 col-xl-2">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h6 class="text-muted mb-3">Panel Admin</h6>

                        <div class="d-grid gap-2">
                            <a class="btn btn-primary btn-sm" href="G-Productos.html">
                                Gestión de Productos
                            </a>

                            <a class="btn btn-outline-secondary btn-sm" href="auth.html">
                                Cerrar sesión
                            </a>

                            </a>
                        </div>
                    </div>
                </div>
            </aside>

            <!-- TABLA -->
            <section class="col-12 col-lg-9 col-xl-10">

                <div class="card shadow-sm">
                    <div class="card-body p-4">

                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <div>
                                <h4 class="mb-1">Gestión de Órdenes</h4>
                                <p class="text-muted mb-0">
                                    Consulta y actualiza el estado de las órdenes registradas.
                                </p>
                            </div>
                        </div>

                        <div class="table-responsive">
                            <table class="table align-middle mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th>ID</th>
                                        <th>Usuario</th>
                                        <th>Fecha</th>
                                        <th>Total</th>
                                        <th>Estado</th>
                                        <th class="text-center">Acción</th>
                                    </tr>
                                </thead>
                                <tbody id="adminOrdersTbody">
                                    <!-- Aquí se cargan las órdenes -->
                                </tbody>
                            </table>
                        </div>

                        <!-- Estado vacío -->
                        <div id="adminEmptyState" class="text-center text-muted py-5 d-none">
                            <div class="fs-1 mb-2">📦</div>
                            <p class="mb-0">No hay órdenes registradas.</p>
                        </div>

                    </div>
                </div>

            </section>

        </div>

    </main>

    <!-- FOOTER -->
    <div id="footer-placeholder"></div>

    <!-- JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- loaders -->
    <script src="js/header_loader.js"></script>
    <script src="js/footer_loader.js"></script>

    <!-- TU JS -->
    <script src="JS/gestion_ordenes.js"></script>

</body>

</html>
