<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Historial de Órdenes | Commerce Connect</title>

    <link rel="icon" href="img/NextGen Web Labs.jpg" type="image/x-icon">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="CSS/main.css">
    <link rel="stylesheet" href="CSS/orders.css">
</head>

<body>

    <div id="header-placeholder"></div>

    <main class="orders-page container py-4">
        <div class="row g-4">

            <aside class="col-12 col-lg-3 col-xl-2">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h6 class="text-muted mb-3">Navegación</h6>

                        <div class="d-grid gap-2">
                            <a class="btn btn-primary btn-sm" href="orders.html">Historial de Órdenes</a>
                            <a class="btn btn-outline-secondary btn-sm" href="auth.html">Cerrar sesión</a>
                        </div>
                    </div>
                </div>
            </aside>

            <section class="col-12 col-lg-9 col-xl-10">
                <div class="card shadow-sm">
                    <div class="card-body p-4">

                        <div
                            class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-3">
                            <div>
                                <h4 class="mb-1">Historial de Órdenes</h4>
                                <p class="text-muted mb-0">Aquí puedes ver el estado y los detalles de todas tus
                                    compras.</p>
                            </div>

                            <div class="d-flex flex-column flex-sm-row gap-2 orders-filters">
                                <input id="searchOrder" class="form-control form-control-sm" type="search"
                                    placeholder="Buscar por ID..." aria-label="Buscar">
                                <select id="filterStatus" class="form-select form-select-sm">
                                    <option value="ALL">Todos</option>
                                    <option value="Entregado">Entregado</option>
                                    <option value="Enviado">Enviado</option>
                                    <option value="Pendiente">Pendiente</option>
                                    <option value="Cancelado">Cancelado</option>
                                </select>
                            </div>
                        </div>

                        <div class="table-responsive">
                            <table class="table align-middle mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th>ID de Orden</th>
                                        <th>Fecha</th>
                                        <th>Total</th>
                                        <th class="text-end">Estado</th>
                                    </tr>
                                </thead>
                                <tbody id="ordersTbody"></tbody>
                            </table>
                        </div>

                        <div id="emptyState" class="text-center text-muted py-5 d-none">
                            <div class="fs-1 mb-2">🧾</div>
                            <p class="mb-0">No se encontraron órdenes con esos filtros.</p>
                        </div>

                        <nav class="d-flex justify-content-center mt-3" aria-label="Paginación">
                            <ul class="pagination pagination-sm mb-0" id="ordersPagination"></ul>
                        </nav>

                    </div>
                </div>
            </section>

        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/header_loader.js"></script>
    <script src="js/footer_loader.js"></script>
    <script src="JS/orders.js"></script>
</body>

</html>
