<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Gestión de Productos - Commerce Connect</title>
    <link rel="icon" href="img/NextGen Web Labs.jpg" type="image/x-icon">
    <link rel="stylesheet" href="CSS/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        /* ── Modal overlay ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active { display: flex; }

        .modal {
            background: #fff;
            border-radius: 10px;
            padding: 2rem;
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .modal h3 { margin: 0; font-size: 1.2rem; }

        .modal input,
        .modal select,
        .modal textarea {
            width: 100%;
            padding: 0.6rem 0.8rem;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 0.95rem;
            box-sizing: border-box;
        }

        .modal textarea { resize: vertical; min-height: 80px; }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 0.75rem;
        }

        .btn-cancelar {
            padding: 0.5rem 1.2rem;
            border: 1px solid #ccc;
            border-radius: 6px;
            background: #fff;
            cursor: pointer;
        }

        .btn-guardar {
            padding: 0.5rem 1.2rem;
            border: none;
            border-radius: 6px;
            background: #2563eb;
            color: #fff;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-guardar:hover { background: #1d4ed8; }

        /* estado vacío / error */
        #estado-tabla {
            text-align: center;
            padding: 2rem;
            color: #888;
            display: none;
        }
    </style>
</head>

<body>

<div id="header-placeholder"></div>

<main class="admin-panel">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <h3>Administración</h3>
        <a href="G-Productos.html" class="sidebar-btn active">Gestión de Productos</a>
        <a href="gestion_ordenes.html" class="sidebar-btn">Gestión de Órdenes</a>
    </aside>

    <!-- CONTENIDO -->
    <section class="gestion-productos">

        <div class="titulo-seccion">
            <h2>Gestión de Productos</h2>
            <button class="btn-nuevo" id="btn-nuevo">+ Añadir Nuevo Producto</button>
        </div>

        <!-- BUSCADOR -->
        <div class="buscador">
            <input type="text" id="buscador-input" placeholder="Buscar productos...">

            <select id="filtro-categoria">
                <option value="">Todas las categorías</option>
            </select>
        </div>

        <!-- TABLA -->
        <table class="tabla-productos">
            <thead>
                <tr>
                    <th>Imagen</th>
                    <th>Nombre</th>
                    <th>Categoría</th>
                    <th>Precio</th>
                    <th>Stock</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tabla-body">
                <!-- Productos cargados dinámicamente -->
            </tbody>
        </table>

        <div id="estado-tabla">Cargando productos...</div>

    </section>

</main>

<!-- MODAL CREAR / EDITAR -->
<div class="modal-overlay" id="modal-overlay">
    <div class="modal">
        <h3 id="modal-titulo">Nuevo Producto</h3>

        <input type="hidden" id="producto-id">
        <input type="text" id="producto-nombre" placeholder="Nombre del producto" required>
        <textarea id="producto-descripcion" placeholder="Descripción"></textarea>

        <!-- Categoría: seleccionar existente o crear nueva -->
        <div style="display:flex; gap:0.5rem; align-items:center;">
            <select id="producto-categoria" style="flex:1;">
                <option value="">Selecciona una categoría</option>
            </select>
            <span style="color:#888; font-size:0.85rem; white-space:nowrap;">o nueva:</span>
            <input type="text" id="nueva-categoria" placeholder="Nueva categoría"
                style="flex:1;">
        </div>

        <input type="number" id="producto-precio" placeholder="Precio" min="0" step="0.01" required>
        <input type="number" id="producto-stock" placeholder="Stock" min="0" required>

        <label style="font-size:0.9rem; color:#555; display:block;">
            Imagen del producto
            <input type="file" id="producto-imagen" accept="image/png, image/jpeg, image/webp"
                style="display:block; margin-top:0.3rem; width:100%;">
        </label>

        <div id="preview-container" style="display:none;">
            <img id="imagen-preview" src="" alt="Preview"
                style="width:100%; max-height:180px; object-fit:contain; border-radius:6px; border:1px solid #ddd;">
            <p id="imagen-actual" style="font-size:0.8rem; color:#888; margin:0.25rem 0 0;">Imagen actual</p>
        </div>

        <div class="modal-actions">
            <button class="btn-cancelar" id="btn-cancelar">Cancelar</button>
            <button class="btn-guardar" id="btn-guardar">Guardar</button>
        </div>
    </div>
</div>

<div id="footer-placeholder"></div>

<script src="js/header_loader.js"></script>
<script src="js/footer_loader.js"></script>
<script src="js/gestion_productos.js"></script>

</body>
</html>
