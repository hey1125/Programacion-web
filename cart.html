<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Carrito | Commerce Connect</title>
    <link rel="icon" href="img/NextGen Web Labs.jpg" type="image/x-icon">
    <link rel="stylesheet" href="CSS/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <div id="header-placeholder"></div>

    <main class="cart">
        <h1 class="cart-title">Tu Carrito</h1>
        <div class="cart-grid">
            <div class="cart-items">
                <div class="cart-item" data-price="35">
                    <img src="img/Mause.jpg" alt="producto">
                    <div class="cart-info">
                        <h3>Mouse Gamer</h3>
                        <span class="price">$35.00</span>

                        <div class="quantity">
                            <button class="qty-btn minus">-</button>
                            <input type="number" value="1" min="1">
                            <button class="qty-btn plus">+</button>
                        </div>
                    </div>
                    <button class="delete">🗑</button>
                </div>

                <div class="cart-item" data-price="50">
                    <img src="img/Teclado.jpg" alt="producto">

                    <div class="cart-info">
                        <h3>Teclado Gamer</h3>
                        <span class="price">$50.00</span>

                        <div class="quantity">
                            <button class="qty-btn minus">-</button>
                            <input type="number" value="2" min="1">
                            <button class="qty-btn plus">+</button>
                        </div>
                    </div>
                    <button class="delete">🗑</button>
                </div>

                <div class="cart-item" data-price="75">
                    <img src="img/Ejemplo.jpg" alt="producto">

                    <div class="cart-info">
                        <h3>Zapatillas Deportivas Minimalistas</h3>
                        <span class="price">$75.00</span>

                        <div class="quantity">
                            <button class="qty-btn minus">-</button>
                            <input type="number" value="1" min="1">
                            <button class="qty-btn plus">+</button>
                        </div>
                    </div>
                    <button class="delete">🗑</button>
                </div>
            </div>

            <div class="cart-sidebar">
                <div class="summary">
                    <h3>Resumen del Pedido</h3>

                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span id="subtotal">$0.00</span>
                    </div>

                    <div class="summary-row">
                        <span>Envío</span>
                        <span>$0.00</span>
                    </div>

                    <div class="summary-row">
                        <span>Impuestos</span>
                        <span id="tax">$0.00</span>
                    </div>

                    <hr>

                    <div class="summary-row total">
                        <span>Total</span>
                        <span id="total">$0.00</span>
                    </div>

                    <button id="confirm-order" class="confirm-btn">
                        Confirmar Pedido
                    </button>
                </div>

                <div class="shipping">
                    <h3>Información de Envío</h3>

                    <div class="form-row">
                        <input type="text" placeholder="Nombre">
                        <input type="text" placeholder="Apellido">
                    </div>

                    <input type="text" placeholder="Dirección">

                    <div class="form-row">
                        <input type="text" placeholder="Ciudad">
                        <input type="text" placeholder="Provincia">
                        <input type="text" placeholder="Código Postal">
                    </div>
                </div>

                <div class="payment">
                    <h3>Método de Pago</h3>

                    <label>
                        <input type="radio" name="payment" checked>
                        Tarjeta de Crédito / Débito
                    </label>

                    <label>
                        <input type="radio" name="payment">
                        PayPal
                    </label>

                    <label>
                        <input type="radio" name="payment">
                        Mercado Pago
                    </label>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>
    <script src="js/header_loader.js"></script>
    <script src="js/footer_loader.js"></script>
    <script src="JS/cart.js"></script>

</body>
</html>
