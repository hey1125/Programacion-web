<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Carrito | Commerce Connect</title>
    <link rel="icon" href="img/NextGen Web Labs.jpg" type="image/x-icon">
    <link rel="stylesheet" href="CSS/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <div id="header-placeholder"></div>

    <main class="cart">
        <h1 class="cart-title">Tu Carrito</h1>
        <div class="cart-grid">

            <!-- Los items se insertan aquí dinámicamente desde cart.js -->
            <div class="cart-items">
                <p style="color: #999;">Cargando carrito...</p>
            </div>

            <div class="cart-sidebar">
                <div class="summary">
                    <h3>Resumen del Pedido</h3>

                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span id="subtotal">$0.00</span>
                    </div>

                    <div class="summary-row">
                        <span>Envío</span>
                        <span>$0.00</span>
                    </div>

                    <div class="summary-row">
                        <span>Impuestos</span>
                        <span id="tax">$0.00</span>
                    </div>

                    <hr>

                    <div class="summary-row total">
                        <span>Total</span>
                        <span id="total">$0.00</span>
                    </div>

                    <button id="confirm-order" class="confirm-btn">
                        Confirmar Pedido
                    </button>
                </div>

                <div class="shipping">
                    <h3>Información de Envío</h3>

                    <div class="form-row">
                        <input type="text" id="name" placeholder="Nombre" required>
                        <input type="text" id="lastname" placeholder="Apellido" required>
                    </div>

                    <input type="text" id="address" placeholder="Dirección" required>

                    <div class="form-row">
                        <input type="text" id="city" placeholder="Ciudad" required>
                        <input type="text" id="province" placeholder="Provincia" required>
                        <input type="text" id="zip" placeholder="Código Postal" required>
                    </div>
                </div>

                <div class="payment">
                    <h3>Método de Pago</h3>

                    <label>
                        <input type="radio" name="payment" value="credit_card" checked>
                        Tarjeta de Crédito / Débito
                    </label>

                    <label>
                        <input type="radio" name="payment" value="paypal">
                        PayPal
                    </label>

                    <label>
                        <input type="radio" name="payment" value="cash">
                        Efectivo
                    </label>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>
    <script src="js/header_loader.js"></script>
    <script src="js/footer_loader.js"></script>
    <script src="JS/cart.js"></script>

</body>
</html>
