<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Home</title>
    <link rel="icon" href="img/NextGen Web Labs.jpg" type="image/x-icon">
    <link rel="stylesheet" href="CSS/main.css">
</head>

<body>
    <div id="header-placeholder"></div>


    <section class="hero">
        <div class="hero-content">
            <h1>¡Descubre las Últimas Tendencias!</h1>
            <p>Explora nuestra nueva colección de productos tecnológicos y de moda.</p>

        </div>
    </section>

    <div class="filters">
        <div class="filter-group">
            <select><option>Categoría</option></select>
            <select><option>Precio</option></select>
            <select><option>Calificación</option></select>
        </div>
        <div class="sort">
        </div>
    </div>

    <main class="product-grid">
        <article class="card">
            <div class="card-img">
                <img src="img/Ejemplo.jpg" alt="zapatillas deportivas ultraligeras">
            </div>
            <div class="card-body">
                <h3>Zapatillas Deportivas Ultraligeras</h3>
                <p class="stars">★★★★☆ <span>(150)</span></p>
                <p class="price">$129.99 <span class="old">$159.99</span></p>
                <button class="btn-add">Agregar al carrito</button>
            </div>
        </article>
    </main>
    <div id="footer-placeholder"></div>
    <script src="js/header_loader.js"></script>
    <script src="js/footer_loader.js"></script>
    <script src="js/articulo_redirect.js"></script>
</body>

</html>
