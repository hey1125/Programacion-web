<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Home</title>
    <link rel="icon" href="img/NextGen Web Labs.jpg" type="image/x-icon">
    <link rel="stylesheet" href="CSS/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <div id="header-placeholder"></div>

    <section class="hero">
        <div class="hero-content">
            <h1>¡Descubre las Últimas Tendencias!</h1>
            <p>Explora nuestra nueva colección de productos tecnológicos y de moda.</p>
        </div>
    </section>

    <div class="filters">
        <div class="filter-group">
            <select><option value="">Categoría</option></select>
            <select><option value="">Precio</option></select>
            <select>
                <option value="">Calificación</option>
                <option value="price_asc">Precio: menor a mayor</option>
                <option value="price_desc">Precio: mayor a menor</option>
            </select>
        </div>
        <div class="sort"></div>
    </div>

    <main class="product-grid">
        <!-- Los productos se inyectan aquí dinámicamente -->
    </main>

    <div id="footer-placeholder"></div>

    <script src="js/header_loader.js"></script>
    <script src="js/footer_loader.js"></script>
    <script src="js/articulo_redirect.js"></script>
    <script src="js/products_loader.js"></script>
</body>

</html>
