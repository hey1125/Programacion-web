<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Artículo - Commerce Connect</title>
    <link rel="icon" href="img/NextGen Web Labs.jpg" type="image/x-icon">
    <link rel="stylesheet" href="CSS/main.css">
</head>

<body>

    <div id="header-placeholder"></div>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="articulo">

        <!-- IMÁGENES -->
        <div class="articulo__imagenes">
            <img src="img/Ejemplo.jpg" class="principal" id="imagenPrincipal">

            <div class="miniaturas">
                <img src="img/Ejemplo.jpg">
                <img src="img/Ejemplo2.jpg">
                <img src="img/Ejemplo3.jpg">
            </div>
        </div>

        <!-- INFORMACIÓN -->
        <div class="articulo__info">
            <h2>Zapatillas Deportivas Ultraligeras</h2>

            <div class="precio">$129.99</div>

            <p class="descripcion">
                Diseñadas para máxima comodidad y rendimiento en cualquier actividad deportiva. Material transpirable, suela antideslizante y ajuste ergonómico.
            </p>

            <div class="botones">
                <button class="agregar">Agregar al carrito</button>
                <button class="comprar">Comprar ahora</button>
            </div>
        </div>

    </main>



    <!-- SCRIPT -->

    <div id="footer-placeholder"></div>
    <script src="js/header_loader.js"></script>
    <script src="js/footer_loader.js"></script>
    <script src="js/articulo.js"></script>

</body>

</html>
